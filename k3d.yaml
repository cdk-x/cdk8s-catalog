apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: cdk8s-catalog

servers: 1
agents: 0

# Kubernetes 1.34, matching the version this catalog targets (see docs/cdk8s-library-pattern.md).
image: rancher/k3s:v1.34.9-k3s1

options:
  k3d:
    # No k3d-managed load balancer - keep the cluster to just the k3s server
    # container. (disableImageVolume left at its default - disabling it
    # breaks k3d's internal "tools" node during cluster creation.)
    disableLoadbalancer: true
    wait: true
    timeout: 60s
  k3s:
    extraArgs:
      # Empty cluster: none of k3s's bundled add-ons. Manifests published by
      # this catalog (e.g. metric-server) are meant to be applied on top of a
      # cluster that doesn't already ship its own competing ingress/LB/metrics.
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
      - arg: "--disable=servicelb"
        nodeFilters:
          - server:*
      - arg: "--disable=metrics-server"
        nodeFilters:
          - server:*
      - arg: "--disable=local-storage"
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
